name: Generate reference

# Auto-generates the reference documentation for the OpenPipeline ecosystem.
# Packages are pulled from packages.viash-hub.com (open source, no credentials)
# at their latest release tag — viash-hub always ships the built `target/`,
# which the documentation generator reads. The generated pages are opened as a
# PR against this repo, so the reference can never drift from released code.
#
# openpipeline_rapids is intentionally excluded for now (not ready).
#
# Requires repo secret GTHB_PAT only for `viash_pro_token`: the generator clones
# the private viash-io/viash_tools repo with it. Package fetching needs no auth.

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC

permissions:
  contents: write
  pull-requests: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout docs
        uses: actions/checkout@v4
        with:
          path: openpipeline_docs
          token: ${{ secrets.GTHB_PAT }}

      # Clone each package from viash-hub at its highest semver tag. viash-hub
      # is public, so no token is needed. The tag per package is exported to
      # $GITHUB_ENV as <package>_tag for the generate steps below.
      - name: Fetch packages from viash-hub
        env:
          GIT_TERMINAL_PROMPT: "0"
        run: |
          set -euo pipefail
          for pkg in openpipeline openpipeline_spatial openpipeline_qc openpipeline_composed; do
            tag=$(curl -sf "https://packages.viash-hub.com/api/v1/repos/vsh/$pkg/tags?limit=100" \
              | python3 -c "import sys,json,re; ts=[t['name'] for t in json.load(sys.stdin) if re.match(r'v?\d+\.\d+', t['name'])]; print(sorted(ts, key=lambda v:[int(x) for x in re.findall(r'\d+', v)])[-1])")
            echo "$pkg -> $tag"
            git clone --quiet --depth 1 --branch "$tag" "https://packages.viash-hub.com/vsh/$pkg.git" "$pkg"
            # Drop vendored dependencies (craftbox/biobox/base openpipeline components):
            # they are external/base libs we only mention, not document, and some of
            # their configs carry no `namespace`, which crashes the qmd generator
            # (firstup(config$namespace) -> substr<- on a non-character object).
            rm -rf "$pkg/target/dependencies"
            echo "${pkg}_tag=$tag" >> "$GITHUB_ENV"
          done

      - uses: viash-io/viash-actions/setup@v6

      # Two passes per package (the proven website recipe): modules first
      # (clean:true wipes stale pages), then workflows (clean:false appends).
      # `ref`/`repository` point source links at the package's GitHub repo+tag.
      - name: Generate — openpipeline (modules)
        uses: viash-io/viash-actions/pro/generate-documentation-qmd@v6
        with:
          project_directory: openpipeline
          query: '^(?!workflows|test_workflows)'
          output_dir: ../openpipeline_docs/reference/openpipeline/
          dest_path: "{namespace}/{name}.qmd"
          viash_pro_token: ${{ secrets.GTHB_PAT }}
          tools_version: main_build
          repository: openpipelines-bio/openpipeline
          ref: ${{ env.openpipeline_tag }}
          clean: true
      - name: Generate — openpipeline (workflows)
        uses: viash-io/viash-actions/pro/generate-documentation-qmd@v6
        with:
          project_directory: openpipeline
          query: '^workflows'
          output_dir: ../openpipeline_docs/reference/openpipeline/
          dest_path: "{namespace}/{name}.qmd"
          viash_pro_token: ${{ secrets.GTHB_PAT }}
          tools_version: main_build
          repository: openpipelines-bio/openpipeline
          ref: ${{ env.openpipeline_tag }}
          clean: false

      - name: Generate — openpipeline_spatial (modules)
        uses: viash-io/viash-actions/pro/generate-documentation-qmd@v6
        with:
          project_directory: openpipeline_spatial
          query: '^(?!workflows|test_workflows)'
          output_dir: ../openpipeline_docs/reference/openpipeline_spatial/
          dest_path: "{namespace}/{name}.qmd"
          viash_pro_token: ${{ secrets.GTHB_PAT }}
          tools_version: main_build
          repository: openpipelines-bio/openpipeline_spatial
          ref: ${{ env.openpipeline_spatial_tag }}
          clean: true
      - name: Generate — openpipeline_spatial (workflows)
        uses: viash-io/viash-actions/pro/generate-documentation-qmd@v6
        with:
          project_directory: openpipeline_spatial
          query: '^workflows'
          output_dir: ../openpipeline_docs/reference/openpipeline_spatial/
          dest_path: "{namespace}/{name}.qmd"
          viash_pro_token: ${{ secrets.GTHB_PAT }}
          tools_version: main_build
          repository: openpipelines-bio/openpipeline_spatial
          ref: ${{ env.openpipeline_spatial_tag }}
          clean: false

      - name: Generate — openpipeline_qc (modules)
        uses: viash-io/viash-actions/pro/generate-documentation-qmd@v6
        with:
          project_directory: openpipeline_qc
          query: '^(?!workflows|test_workflows)'
          output_dir: ../openpipeline_docs/reference/openpipeline_qc/
          dest_path: "{namespace}/{name}.qmd"
          viash_pro_token: ${{ secrets.GTHB_PAT }}
          tools_version: main_build
          repository: openpipelines-bio/openpipeline_qc
          ref: ${{ env.openpipeline_qc_tag }}
          clean: true
      - name: Generate — openpipeline_qc (workflows)
        uses: viash-io/viash-actions/pro/generate-documentation-qmd@v6
        with:
          project_directory: openpipeline_qc
          query: '^workflows'
          output_dir: ../openpipeline_docs/reference/openpipeline_qc/
          dest_path: "{namespace}/{name}.qmd"
          viash_pro_token: ${{ secrets.GTHB_PAT }}
          tools_version: main_build
          repository: openpipelines-bio/openpipeline_qc
          ref: ${{ env.openpipeline_qc_tag }}
          clean: false

      - name: Generate — openpipeline_composed (modules)
        uses: viash-io/viash-actions/pro/generate-documentation-qmd@v6
        with:
          project_directory: openpipeline_composed
          query: '^(?!workflows|test_workflows)'
          output_dir: ../openpipeline_docs/reference/openpipeline_composed/
          dest_path: "{namespace}/{name}.qmd"
          viash_pro_token: ${{ secrets.GTHB_PAT }}
          tools_version: main_build
          repository: openpipelines-bio/openpipeline_composed
          ref: ${{ env.openpipeline_composed_tag }}
          clean: true
      - name: Generate — openpipeline_composed (workflows)
        uses: viash-io/viash-actions/pro/generate-documentation-qmd@v6
        with:
          project_directory: openpipeline_composed
          query: '^workflows'
          output_dir: ../openpipeline_docs/reference/openpipeline_composed/
          dest_path: "{namespace}/{name}.qmd"
          viash_pro_token: ${{ secrets.GTHB_PAT }}
          tools_version: main_build
          repository: openpipelines-bio/openpipeline_composed
          ref: ${{ env.openpipeline_composed_tag }}
          clean: false

      - name: Open PR
        working-directory: openpipeline_docs
        env:
          GITHUB_TOKEN: ${{ secrets.GTHB_PAT }}
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add reference
          if git diff --cached --quiet; then
            echo "Reference already up to date — nothing to propose."
            exit 0
          fi
          BRANCH="reference/update"
          git checkout -B "$BRANCH"
          git commit -m "Regenerate reference from viash-hub"
          git push --force-with-lease --set-upstream origin "$BRANCH"
          gh pr create --title "Regenerate reference" \
            --base main --head "$BRANCH" \
            --body "Auto-generated from packages.viash-hub.com (latest release of each package). Do not hand-edit \`reference/<package>/\`." \
            || echo "PR already open for $BRANCH; branch updated."
