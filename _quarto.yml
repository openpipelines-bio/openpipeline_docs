project:
  type: website
  output-dir: _site
  preview:
    port: 4200
  # Draft site: ship a crawler-blocking robots.txt into the build output.
  resources:
    - robots.txt
  # NOTE: team/ is a hand-curated static page for now (sections + roles the flat
  # author registry can't express). scripts/generate_team.py is kept for the
  # eventual return to auto-generation but is intentionally NOT wired as a
  # pre-render step.

website:
  title: "OpenPipeline"
  description: "Best-practice workflows for single-cell and spatial multi-omics data"
  image: images/logo.svg
  # Draft rebuild — deploys to its own GitHub Pages project URL, NOT the
  # production custom domain (openpipelines.bio, served from the `website` repo).
  site-url: https://openpipelines-bio.github.io/openpipeline_docs/
  repo-url: https://github.com/openpipelines-bio/openpipeline_docs
  repo-actions: none

  page-footer:
    left: "© OpenPipeline"

  navbar:
    # Mark only (theme-adapting) + the wordmark as title text — the clearer
    # treatment from design/mockup.html. The old logo.svg stacked the wordmark
    # under the mark, which turned to mush at navbar height.
    logo: images/logo-mark.svg
    title: "OpenPipeline"
    left:
      - href: get-started/index.qmd
        text: Get started
      - href: guides/index.qmd
        text: Guides
      - href: concepts/index.qmd
        text: Concepts
      - href: reference/index.qmd
        text: Reference
      - href: contributing/index.qmd
        text: Contributing
      - href: team/index.qmd
        text: Team
    right:
      - icon: github
        href: https://github.com/openpipelines-bio
        aria-label: GitHub

  sidebar:
    - id: get-started
      title: "Get started"
      contents: get-started/*
    - id: guides
      title: "Guides"
      contents: guides/*
    - id: concepts
      title: "Concepts"
      contents: concepts/*
    - id: contributing
      title: "Contributing"
      contents: contributing/*
    # Reference has no sidebar — it's a single full-width catalog
    # (reference/index.qmd) browsed via its own package filter + search.

format:
  html:
    # Light + dark pair — Quarto adds a navbar toggle. The dark variant layers
    # theme-dark.scss (palette only) over the shared rules in theme.scss.
    theme:
      light: [cosmo, theme.scss]
      dark: [cosmo, theme.scss, theme-dark.scss]
    # Dark "scientific terminal" code blocks, matching design/mockup.html.
    highlight-style: monokai
    toc: true
    grid:
      content-mode: standard
    # Draft site: ask search engines not to index or follow any page.
    include-in-header:
      - text: |
          <meta name="robots" content="noindex, nofollow">

