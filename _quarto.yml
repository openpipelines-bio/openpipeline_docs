project:
  type: website
  output-dir: _site
  preview:
    port: 4200
  # Draft site: ship a crawler-blocking robots.txt into the build output.
  resources:
    - robots.txt
  # Generate the Team page from the openpipeline (core) author registry before
  # rendering. See scripts/generate_team.py.
  pre-render:
    - scripts/generate_team.py

website:
  title: "OpenPipeline"
  description: "Best-practice workflows for single-cell and spatial multi-omics data"
  image: images/logo.svg
  # Draft rebuild — deploys to its own GitHub Pages project URL, NOT the
  # production custom domain (openpipelines.bio, served from the `website` repo).
  site-url: https://openpipelines-bio.github.io/openpipeline_docs/
  repo-url: https://github.com/openpipelines-bio/openpipeline_docs
  repo-actions: none

  page-footer:
    left: "© OpenPipeline"

  navbar:
    logo: images/logo.svg
    title: false
    left:
      - href: get-started/index.qmd
        text: Get started
      - href: guides/index.qmd
        text: Guides
      - href: concepts/index.qmd
        text: Concepts
      - href: reference/index.qmd
        text: Reference
      - href: contributing/index.qmd
        text: Contributing
      - href: team/index.qmd
        text: Team
    right:
      - icon: github
        href: https://github.com/openpipelines-bio
        aria-label: GitHub

  sidebar:
    - id: get-started
      title: "Get started"
      contents: get-started/*
    - id: guides
      title: "Guides"
      contents: guides/*
    - id: concepts
      title: "Concepts"
      contents: concepts/*
    - id: contributing
      title: "Contributing"
      contents: contributing/*
    # Reference is auto-generated per package; grouped by package so the
    # facet/filter in the mockup maps onto real sidebar sections.
    - id: reference
      title: "Reference"
      collapse-level: 2
      contents:
        - section: "openpipeline"
          contents: reference/openpipeline/*
        - section: "openpipeline_spatial"
          contents: reference/openpipeline_spatial/*
        - section: "openpipeline_qc"
          contents: reference/openpipeline_qc/*
        - section: "openpipeline_rapids"
          contents: reference/openpipeline_rapids/*
        - section: "openpipeline_composed"
          contents: reference/openpipeline_composed/*

format:
  html:
    theme: [cosmo, theme.scss]
    toc: true
    grid:
      content-mode: standard
    # Draft site: ask search engines not to index or follow any page.
    include-in-header:
      - text: |
          <meta name="robots" content="noindex, nofollow">

